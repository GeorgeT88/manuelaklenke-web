            CONCLUSION=$(gh api "repos/GeorgeT88/manuelaklenke-cypress-e2e/actions/runs/$RUN_ID" --jq '.conclusion')
            echo "Status: $STATUS | Conclusion: $CONCLUSION"

            if [ "$STATUS" = "completed" ]; then
