name: CI

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        run: npx tsc -b && npx vite build

  wait-for-vercel:
    name: Wait for Vercel Deployment
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ needs.build.result == 'success' }}
    steps:
      - name: Wait for Vercel production deployment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Waiting for Vercel to deploy ${{ github.sha }}..."
          for i in $(seq 1 40); do
            DEPLOY_ID=$(gh api "repos/${{ github.repository }}/deployments?sha=${{ github.sha }}" \
              | jq -r '[.[] | select(.environment == "Production" or .environment == "production")] | .[0].id // empty')
            if [ -n "$DEPLOY_ID" ]; then
              STATE=$(gh api "repos/${{ github.repository }}/deployments/$DEPLOY_ID/statuses" \
                | jq -r '.[0].state // empty')
              echo "Deployment $DEPLOY_ID — state: $STATE"
              if [ "$STATE" = "success" ]; then
                echo "Vercel deployment complete."
                exit 0
              elif [ "$STATE" = "failure" ] || [ "$STATE" = "error" ]; then
                echo "Vercel deployment failed."
                exit 1
              fi
            else
              echo "Attempt $i: no deployment found yet, retrying in 15s..."
            fi
            sleep 15
          done
          echo "Timed out waiting for Vercel deployment."
          exit 1

  playwright-e2e:
    name: Playwright E2E Tests
    runs-on: ubuntu-latest
    needs: [wait-for-vercel]
    if: ${{ needs.wait-for-vercel.result == 'success' }}
    steps:
      - name: Wait for any in-progress E2E runs to finish
        env:
          GH_TOKEN: ${{ secrets.E2E_TRIGGER_TOKEN }}
        run: |
          echo "Checking for in-progress runs on manuelaklenke-playwright-e2e..."
          while true; do
            IN_PROGRESS=$(gh api "repos/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs?status=in_progress" \
              --jq '.total_count')
            QUEUED=$(gh api "repos/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs?status=queued" \
              --jq '.total_count')
            echo "In-progress: $IN_PROGRESS | Queued: $QUEUED"
            if [ "$IN_PROGRESS" -eq 0 ] && [ "$QUEUED" -eq 0 ]; then
              echo "No active runs, proceeding with dispatch."
              break
            fi
            sleep 15
          done

      - name: Dispatch E2E tests and record timestamp
        env:
          GH_TOKEN: ${{ secrets.E2E_TRIGGER_TOKEN }}
        run: |
          DISPATCH_TIME=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "DISPATCH_TIME=$DISPATCH_TIME" >> $GITHUB_ENV

          gh api repos/GeorgeT88/manuelaklenke-playwright-e2e/dispatches \
            --method POST \
            -f event_type=vercel-deploy

      - name: Wait for E2E run to appear
        env:
          GH_TOKEN: ${{ secrets.E2E_TRIGGER_TOKEN }}
        run: |
          echo "Looking for workflow run created after $DISPATCH_TIME ..."
          for i in $(seq 1 20); do
            RUN_ID=$(gh api "repos/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs?event=repository_dispatch" \
              | jq -r --arg t "$DISPATCH_TIME" \
              '[.workflow_runs[] | select(.created_at > $t)] | .[0].id // empty')
            if [ -n "$RUN_ID" ]; then
              echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
              echo "Found run: $RUN_ID"
              break
            fi
            echo "Attempt $i: run not found yet, retrying in 10s..."
            sleep 10
          done

          if [ -z "$RUN_ID" ]; then
            echo "No E2E workflow run found after dispatch."
            exit 1
          fi

      - name: Poll E2E run until complete
        env:
          GH_TOKEN: ${{ secrets.E2E_TRIGGER_TOKEN }}
        run: |
          echo "Polling run $RUN_ID ..."
          while true; do
            STATUS=$(gh api "repos/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs/$RUN_ID" --jq '.status')
            CONCLUSION=$(gh api "repos/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs/$RUN_ID" --jq '.conclusion')
            echo "Status: $STATUS | Conclusion: $CONCLUSION"

            if [ "$STATUS" = "completed" ]; then
              echo "Run URL: https://github.com/GeorgeT88/manuelaklenke-playwright-e2e/actions/runs/$RUN_ID"
              if [ "$CONCLUSION" = "success" ]; then
                echo "E2E tests passed."
                exit 0
              else
                echo "E2E tests failed (conclusion: $CONCLUSION)."
                exit 1
              fi
            fi

            sleep 30
          done

